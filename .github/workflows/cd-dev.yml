name: CD — Deploy to Development

on:
  push:
    branches: [develop]

# Only one deploy at a time per environment
concurrency:
  group: deploy-development
  cancel-in-progress: true

jobs:
  deploy-dev:
    name: Deploy to Development (Render.com)
    runs-on: ubuntu-latest
    environment:
      name: development
      url: ${{ vars.RENDER_DEV_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install & Lint (gate before deploy)
        run: |
          npm ci
          npm run lint

      - name: Trigger Render.com Deploy — Development
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            "https://api.render.com/v1/services/${{ secrets.RENDER_DEV_SERVICE_ID }}/deploys" \
            --fail \
            --output /tmp/deploy_response.json
          echo "Deploy response:"
          cat /tmp/deploy_response.json

      - name: Wait for deployment to complete
        run: |
          DEPLOY_ID=$(cat /tmp/deploy_response.json | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          echo "Deploy ID: $DEPLOY_ID"
          for i in $(seq 1 30); do
            STATUS=$(curl -s -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
              "https://api.render.com/v1/services/${{ secrets.RENDER_DEV_SERVICE_ID }}/deploys/$DEPLOY_ID" \
              | python3 -c "import sys,json; print(json.load(sys.stdin)['status'])")
            echo "Status: $STATUS (attempt $i)"
            if [ "$STATUS" = "live" ]; then
              echo "✅ Deployment successful!"
              exit 0
            elif [ "$STATUS" = "failed" ] || [ "$STATUS" = "canceled" ]; then
              echo "❌ Deployment failed with status: $STATUS"
              exit 1
            fi
            sleep 10
          done
          echo "⏰ Timeout waiting for deployment"
          exit 1

      - name: Health check — Development
        run: |
          sleep 5
          curl -f ${{ vars.RENDER_DEV_URL }} || exit 1
          echo "✅ Development environment is live at ${{ vars.RENDER_DEV_URL }}"
