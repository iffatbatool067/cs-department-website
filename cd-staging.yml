name: CD — Deploy to Staging/QA

on:
  push:
    branches: [release/*]

concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  deploy-staging:
    name: Deploy to Staging/QA (Render.com)
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: ${{ vars.RENDER_STAGING_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install & Lint
        run: |
          npm ci
          npm run lint

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Docker image (Staging tag)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/cs-dept-website:staging
            ${{ secrets.DOCKER_USERNAME }}/cs-dept-website:staging-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Render.com Deploy — Staging
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            "https://api.render.com/v1/services/${{ secrets.RENDER_STAGING_SERVICE_ID }}/deploys" \
            --fail \
            --output /tmp/deploy_response.json

      - name: Wait for staging deployment
        run: |
          DEPLOY_ID=$(cat /tmp/deploy_response.json | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          for i in $(seq 1 36); do
            STATUS=$(curl -s -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
              "https://api.render.com/v1/services/${{ secrets.RENDER_STAGING_SERVICE_ID }}/deploys/$DEPLOY_ID" \
              | python3 -c "import sys,json; print(json.load(sys.stdin)['status'])")
            echo "Status: $STATUS (attempt $i/36)"
            if [ "$STATUS" = "live" ]; then echo "✅ Staging live!"; exit 0; fi
            if [ "$STATUS" = "failed" ] || [ "$STATUS" = "canceled" ]; then echo "❌ Failed: $STATUS"; exit 1; fi
            sleep 10
          done
          exit 1

      - name: QA Smoke Tests
        run: |
          BASE=${{ vars.RENDER_STAGING_URL }}
          PAGES=("" "courses.html" "faculty.html" "admissions.html" "contact.html")
          for page in "${PAGES[@]}"; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$BASE/$page")
            echo "$BASE/$page → HTTP $STATUS"
            if [ "$STATUS" != "200" ]; then echo "❌ Failed: $page"; exit 1; fi
          done
          echo "✅ All pages return HTTP 200 on Staging"
